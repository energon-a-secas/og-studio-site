<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image Generator</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Avenir Next', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #040714;
      color: #f9f9f9;
      min-height: 100vh;
      padding: 32px;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; }
    .subtitle { color: rgba(255,255,255,.55); font-size: .9rem; margin-bottom: 32px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 24px;
    }
    .card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 15px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .card-title { font-size: 1rem; font-weight: 600; }
    .card-domain { font-size: .78rem; color: rgba(255,255,255,.45); }
    canvas {
      width: 100%;
      height: auto;
      border-radius: 10px;
      display: block;
    }
    .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      background: #0063e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: .82rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 200ms;
    }
    button:hover { background: #0080ff; }
    button.secondary {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
    }
    button.secondary:hover { background: rgba(255,255,255,.12); }
    .dl-all { margin-bottom: 24px; }
    .config-row {
      display: flex; gap: 12px; align-items: center;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    .config-row label { font-size: .82rem; color: rgba(255,255,255,.55); }
    select, input[type="text"] {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: #f9f9f9;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: .82rem;
      font-family: inherit;
    }
  </style>
</head>
<body>

  <h1>Neorgon OG Image Generator</h1>
  <p class="subtitle">Generate social preview images (1200x630) for all Neorgon sites</p>

  <div class="config-row">
    <label>Pattern:</label>
    <select id="patternSelect">
      <option value="constellation" selected>Constellation</option>
      <option value="dots">Dot Grid</option>
      <option value="circuits">Circuit Lines</option>
      <option value="none">None (gradient only)</option>
    </select>
    <label>Pattern density:</label>
    <select id="densitySelect">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>
    <button onclick="renderAll()">Regenerate All</button>
    <button class="secondary dl-all" onclick="downloadAll()">Download All PNGs</button>
  </div>

  <div class="grid" id="grid"></div>

  <script>
    const W = 1200, H = 630;

    const sites = [
      { id: 'neorgon',          title: 'Neorgon',              subtitle: 'Developer Tools Hub',                accent: '#818cf8', domain: 'neorgon.com' },
      { id: 'skill-roadmap',    title: 'Skill Roadmap',        subtitle: 'Visual Learning Path Builder',       accent: '#a78bfa', domain: 'skillmap.neorgon.com' },
      { id: 'infra-drills',     title: 'Infra Drills',         subtitle: 'Break-Fix Challenges',               accent: '#fbbf24', domain: 'infradrills.neorgon.com' },
      { id: 'json-studio',      title: 'JSON Studio',          subtitle: 'Visual Block Editor',                accent: '#2dd4bf', domain: 'jsonstudio.neorgon.com' },
      { id: 'client-says',      title: 'Client Says',          subtitle: 'Timezone Converter',                 accent: '#f472b6', domain: 'clientsays.neorgon.com' },
      { id: 'decision-wheel',   title: 'Decision Wheel',       subtitle: 'Spin to Decide',                     accent: '#34d399', domain: 'decisionwheel.neorgon.com' },
      { id: 'reference-matrix', title: 'Reference Matrix',     subtitle: 'Cultural References API',            accent: '#f472b6', domain: 'references.neorgon.com' },
      { id: 'presentation-sage',title: 'Presentation Sage',    subtitle: 'YAML Slide Editor',                  accent: '#fb923c', domain: 'slides.neorgon.com' },
      { id: 'emoji-archive',    title: 'Emoji Archive',        subtitle: 'Slack Emoji Collection',             accent: '#22d3ee', domain: 'emojis.neorgon.com' },
      { id: 'pathfinder',       title: 'Pathfinder',           subtitle: 'Visual Strategy Canvas',             accent: '#4ade80', domain: 'pathfinder.neorgon.com' },
    ];

    /* ── Seeded RNG for consistent patterns per site ──────────────── */
    function mulberry32(seed) {
      return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    function hashStr(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
      return h;
    }

    /* ── Drawing helpers ──────────────────────────────────────────── */

    function drawGradientBg(ctx) {
      const grd = ctx.createLinearGradient(0, 0, W, H);
      grd.addColorStop(0,    '#B015B0');
      grd.addColorStop(0.45, '#3D0080');
      grd.addColorStop(1,    '#040714');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);
    }

    function drawConstellation(ctx, rng, accent, count) {
      const pts = [];
      for (let i = 0; i < count; i++) {
        pts.push({ x: rng() * W, y: rng() * H, r: 1 + rng() * 2.5 });
      }
      // lines between nearby points
      ctx.strokeStyle = accent + '12';
      ctx.lineWidth = 0.8;
      for (let i = 0; i < pts.length; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 160) {
            const alpha = Math.round((1 - dist / 160) * 25);
            ctx.strokeStyle = accent + alpha.toString(16).padStart(2, '0');
            ctx.beginPath();
            ctx.moveTo(pts[i].x, pts[i].y);
            ctx.lineTo(pts[j].x, pts[j].y);
            ctx.stroke();
          }
        }
      }
      // dots
      for (const p of pts) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = accent + '30';
        ctx.fill();
      }
    }

    function drawDotGrid(ctx, accent, spacing) {
      ctx.fillStyle = accent + '18';
      for (let x = spacing / 2; x < W; x += spacing) {
        for (let y = spacing / 2; y < H; y += spacing) {
          ctx.beginPath();
          ctx.arc(x, y, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawCircuits(ctx, rng, accent, count) {
      ctx.strokeStyle = accent + '15';
      ctx.lineWidth = 1.2;
      ctx.lineCap = 'round';
      for (let i = 0; i < count; i++) {
        let x = rng() * W, y = rng() * H;
        ctx.beginPath();
        ctx.moveTo(x, y);
        const segs = 3 + Math.floor(rng() * 5);
        for (let s = 0; s < segs; s++) {
          if (rng() > 0.5) x += (rng() > 0.5 ? 1 : -1) * (30 + rng() * 80);
          else              y += (rng() > 0.5 ? 1 : -1) * (30 + rng() * 80);
          ctx.lineTo(x, y);
        }
        ctx.stroke();
        // node dot at end
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fillStyle = accent + '25';
        ctx.fill();
      }
    }

    function drawPattern(ctx, rng, accent, pattern, density) {
      const densityMap = { low: 0.5, medium: 1, high: 1.8 };
      const d = densityMap[density] || 1;

      if (pattern === 'constellation') drawConstellation(ctx, rng, accent, Math.round(80 * d));
      else if (pattern === 'dots')     drawDotGrid(ctx, accent, Math.round(40 / d));
      else if (pattern === 'circuits') drawCircuits(ctx, rng, accent, Math.round(30 * d));
    }

    function drawText(ctx, title, subtitle, accent) {
      const cx = W / 2, cy = H / 2;

      // subtle glow behind title
      ctx.save();
      ctx.shadowColor = accent + '60';
      ctx.shadowBlur = 60;
      ctx.fillStyle = '#ffffff';
      ctx.font = '700 64px "Avenir Next", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(title, cx, cy - 20);
      ctx.restore();

      // crisp title on top
      ctx.fillStyle = '#ffffff';
      ctx.font = '700 64px "Avenir Next", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(title, cx, cy - 20);

      // accent line
      const lineW = 80;
      ctx.strokeStyle = accent;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx - lineW / 2, cy + 24);
      ctx.lineTo(cx + lineW / 2, cy + 24);
      ctx.stroke();

      // subtitle
      ctx.fillStyle = 'rgba(255,255,255,.65)';
      ctx.font = '500 24px "Avenir Next", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      ctx.fillText(subtitle, cx, cy + 60);
    }

    function drawBranding(ctx) {
      // small "neorgon.com" bottom-right
      ctx.fillStyle = 'rgba(255,255,255,.3)';
      ctx.font = '500 16px "Avenir Next", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'bottom';
      ctx.fillText('neorgon.com', W - 32, H - 24);
    }

    function drawVignette(ctx) {
      // radial vignette for depth
      const grd = ctx.createRadialGradient(W / 2, H / 2, W * 0.25, W / 2, H / 2, W * 0.7);
      grd.addColorStop(0, 'rgba(0,0,0,0)');
      grd.addColorStop(1, 'rgba(0,0,0,0.35)');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);
    }

    /* ── Render a single site ─────────────────────────────────────── */

    function renderSite(site, canvas, pattern, density) {
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');
      const rng = mulberry32(hashStr(site.id));

      drawGradientBg(ctx);
      drawPattern(ctx, rng, site.accent, pattern, density);
      drawVignette(ctx);
      drawText(ctx, site.title, site.subtitle, site.accent);
      drawBranding(ctx);
    }

    /* ── Build the UI ─────────────────────────────────────────────── */

    const canvases = {};

    function buildGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      for (const site of sites) {
        const card = document.createElement('div');
        card.className = 'card';

        const header = document.createElement('div');
        header.className = 'card-header';
        header.innerHTML = `
          <div>
            <div class="card-title" style="color:${site.accent}">${site.title}</div>
            <div class="card-domain">${site.domain}</div>
          </div>
        `;

        const canvas = document.createElement('canvas');
        canvases[site.id] = canvas;

        const actions = document.createElement('div');
        actions.className = 'actions';
        const dlBtn = document.createElement('button');
        dlBtn.textContent = 'Download PNG';
        dlBtn.onclick = () => downloadSite(site);
        actions.appendChild(dlBtn);

        card.appendChild(header);
        card.appendChild(canvas);
        card.appendChild(actions);
        grid.appendChild(card);
      }
    }

    function renderAll() {
      const pattern = document.getElementById('patternSelect').value;
      const density = document.getElementById('densitySelect').value;
      for (const site of sites) {
        renderSite(site, canvases[site.id], pattern, density);
      }
    }

    function downloadSite(site) {
      const canvas = canvases[site.id];
      canvas.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `og-${site.id}.png`;
        a.click();
        URL.revokeObjectURL(a.href);
      }, 'image/png');
    }

    function downloadAll() {
      for (const site of sites) {
        setTimeout(() => downloadSite(site), sites.indexOf(site) * 200);
      }
    }

    buildGrid();
    renderAll();
  </script>
</body>
</html>
